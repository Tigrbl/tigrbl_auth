name: tigrbl_auth release bundle

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal governance dependencies
        run: python -m pip install --upgrade pip PyYAML cryptography
      - name: Build release bundle
        run: python scripts/build_release_bundle.py
      - name: Sign release bundles
        run: python scripts/sign_release_bundle.py
      - name: Verify signed bundle artifacts
        run: python scripts/verify_release_signing.py
      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tigrbl-auth-release-bundles
          path: dist/release-bundles/
