name: tigrbl_auth publish pypi

on:
  workflow_run:
    workflows: ["tigrbl_auth release gates"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout workflow commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Validate release version is publishable
        run: |
          python - <<'PY'
          import pathlib, tomllib
          project = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')).get('project', {})
          version = str(project.get('version', '')).strip()
          if not version:
              raise SystemExit('Missing project.version in pyproject.toml')
          import re
          if re.search(r'(?:\.dev|a\d|b\d|rc\d)', version):
              raise SystemExit(f"Refusing to publish pre-release/dev version to PyPI: {version}")
          print(f"Publishing version: {version}")
          PY

      - name: Build distribution artifacts
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${UV_PUBLISH_TOKEN}" ]; then
            echo "Missing required secret: PYPI_API_TOKEN" >&2
            exit 1
          fi
          uv publish --token "$UV_PUBLISH_TOKEN" dist/*
