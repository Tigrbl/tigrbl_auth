name: tigrbl_auth recertification

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  recertify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal governance dependencies
        run: python -m pip install --upgrade pip PyYAML
      - name: Run recertification check
        run: python scripts/run_recertification.py
