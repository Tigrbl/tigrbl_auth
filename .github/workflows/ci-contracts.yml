name: tigrbl_auth contracts

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal governance dependencies
        run: python -m pip install --upgrade pip PyYAML
      - name: Generate OpenAPI/OpenRPC
        run: |
          python scripts/generate_openapi_contract.py
          python scripts/generate_openrpc_contract.py
      - name: Validate OpenAPI
        run: python scripts/validate_openapi_contract.py
      - name: Validate OpenRPC
        run: python scripts/validate_openrpc_contract.py
      - name: Diff contracts
        run: python scripts/diff_contracts.py
