title: Peer Profile
type: object
required:
- schema_version
- id
- title
- counterpart_id
- required_targets
- required_artifacts
- scenario_ids
- contract_profiles
- preferred_runtime_profile
- peer_verification_class
properties:
  schema_version:
    type: integer
    const: 1
  id:
    type: string
    minLength: 1
  title:
    type: string
    minLength: 1
  counterpart_id:
    type: string
    minLength: 1
  required_targets:
    type: array
    minItems: 1
    items:
      type: string
  required_artifacts:
    type: array
    minItems: 1
    items:
      type: string
  scenario_ids:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
  scenario_target_map:
    type: object
    additionalProperties:
      type: array
      items:
        type: string
  contract_profiles:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum:
      - baseline
      - production
      - hardening
      - peer-claim
  preferred_runtime_profile:
    type: string
    enum:
    - baseline
    - production
    - hardening
  peer_verification_class:
    type: string
    enum:
    - external-independent
  notes:
    type: array
    items:
      type: string
additionalProperties: true
