title: Tier 4 Peer Evidence Bundle
type: object
required:
- schema_version
- bundle_id
- peer_profile
- counterpart_id
- status
- runtime_profile
- target_ids
- scenario_results
- peer_identity
- peer_runtime
- independence_attestation
- artifacts
properties:
  schema_version:
    type: integer
    const: 1
  bundle_id:
    type: string
  peer_profile:
    type: string
  counterpart_id:
    type: string
  status:
    type: string
    enum:
    - external-preserved-passed
    - external-preserved-failed
  runtime_profile:
    type: string
    enum:
    - baseline
    - production
    - hardening
    - peer-claim
  target_ids:
    type: array
    minItems: 1
    items:
      type: string
  scenario_results:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - id
      - passed
      properties:
        id:
          type: string
        passed:
          type: boolean
      additionalProperties: true
  peer_identity:
    type: object
    required:
    - peer_name
    - peer_version
    properties:
      peer_name:
        type: string
      peer_version:
        type: string
    additionalProperties: true
  peer_runtime:
    type: object
    required:
    - image_ref
    - image_digest
    properties:
      image_ref:
        type: string
      image_digest:
        type: string
    additionalProperties: true
  independence_attestation:
    type: object
    required:
    - attestation_class
    - counterpart_identified
    - reproduction_preserved
    properties:
      attestation_class:
        type: string
        enum:
        - independent-external
      counterpart_identified:
        type: boolean
        const: true
      reproduction_preserved:
        type: boolean
        const: true
    additionalProperties: true
  artifacts:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - path
      - sha256
      properties:
        path:
          type: string
        sha256:
          type: string
      additionalProperties: true
additionalProperties: true
