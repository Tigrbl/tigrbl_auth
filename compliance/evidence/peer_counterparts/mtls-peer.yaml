schema_version: 1
id: mtls-peer
title: External mTLS-capable client or gateway harness
counterpart_class: sender-constrained-client
execution_style: black-box-http-mtls
independence_requirement: external certificate-bound runner required
attestation_class_required: independent-external
required_identity_fields:
- peer_name
- peer_version
required_container_fields:
- image_ref
- image_digest
required_artifacts:
- http-transcript.yaml
- certificate-chain.pem
- result.yaml
notes:
- Use for RFC 8705 interop and certificate-binding verification.
