schema_version: 1
package: tigrbl_auth
planes:
  api:
    responsibility: transport only
    modules:
    - tigrbl_auth/api
    boundary: certified_core
  tables:
    responsibility: persistence only
    modules:
    - tigrbl_auth/tables
    boundary: certified_core
  ops:
    responsibility: transaction-owning orchestration
    modules:
    - tigrbl_auth/ops
    boundary: certified_core
  services:
    responsibility: reusable domain and integration services
    modules:
    - tigrbl_auth/services
    boundary: certified_core
  standards:
    responsibility: protocol-specific behavior
    modules:
    - tigrbl_auth/standards
    boundary: certified_core
  security:
    responsibility: cross-cutting hardening
    modules:
    - tigrbl_auth/security
    boundary: certified_core
  config:
    responsibility: profile and feature resolution
    modules:
    - tigrbl_auth/config
    boundary: certified_core
  adapters:
    responsibility: provider and trust seams
    modules:
    - tigrbl_auth/adapters
    boundary: certified_core
  cli:
    responsibility: operator and certification UX
    modules:
    - tigrbl_auth/cli
    boundary: certified_core
  plugin:
    responsibility: installable Tigrbl plugin composition
    modules:
    - tigrbl_auth/plugin.py
    boundary: certified_core
  gateway:
    responsibility: standalone Tigrbl gateway assembly
    modules:
    - tigrbl_auth/gateway.py
    boundary: certified_core
